      REMOTE_APP_ROOT: /home/dh_nacbxf/clock.damjanski.com
      SITE_URL: https://clock.damjanski.com
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package DreamHost bundle
        run: npm run package:dreamhost

      - name: Configure SSH
